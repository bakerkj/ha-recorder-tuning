run_purge_now:
  name: Run Purge Now
  description: >-
    Immediately execute all enabled purge rules without waiting for the
    scheduled time. Pass dry_run: true to log what would be deleted without
    actually removing any data.
  fields:
    dry_run:
      name: Dry Run
      description: >-
        When true, logs the entity name, row count, and date range of data that
        would be deleted for each rule — without deleting anything. When
        omitted, inherits the dry_run setting from configuration.yaml, so the
        service call behaves identically to the scheduled nightly run.
      required: false
      selector:
        boolean:

reload:
  name: Reload
  description: >-
    Reload the recorder_tuning configuration from configuration.yaml (including
    any !include files). Call this after editing configuration.yaml without
    restarting Home Assistant. If the YAML is invalid the reload fails and the
    previous configuration is preserved.

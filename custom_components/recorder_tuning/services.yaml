run_purge_now:
  name: Run Purge Now
  description: >-
    Immediately execute enabled purge rules without waiting for the scheduled
    time. Runs the per-entity rules only; the trailing global recorder.purge is
    NOT triggered by default (unlike the scheduled nightly run). Pass
    ha_recorder_purge: true to include it.
  fields:
    dry_run:
      name: Dry Run
      description: >-
        When true, logs the entity name, row count, and date range of data that
        would be deleted for each rule — without deleting anything. When
        omitted, inherits the dry_run setting from configuration.yaml.
      required: false
      example: true
      selector:
        boolean:
    rule_names:
      name: Rule Names
      description: >-
        Optional list of rule names to run (matched against each rule's
        `name:`). Unknown names are logged as a warning but do not abort the
        call. When provided, the trailing global recorder.purge step is always
        skipped — use this to test one or two rules in isolation.
      required: false
      example:
        - Frigate camera metrics
      selector:
        text:
          multiple: true
    ha_recorder_purge:
      name: Include HA Recorder Purge
      description: >-
        When true, also trigger HA's recorder.purge after the rules run — this
        matches the scheduled nightly flow (global states prune, short-term
        stats prune via the monkey-patch, and optional repack). Default false
        because the global purge can take minutes. Ignored when rule_names is
        provided.
      required: false
      example: false
      default: false
      selector:
        boolean:

reload:
  name: Reload
  description: >-
    Reload the recorder_tuning configuration from configuration.yaml (including
    any !include files). Call this after editing configuration.yaml without
    restarting Home Assistant. If the YAML is invalid the reload fails and the
    previous configuration is preserved.

name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-suffix: tests
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - run: uv run python -m pytest tests/ --ignore=tests/integration -v

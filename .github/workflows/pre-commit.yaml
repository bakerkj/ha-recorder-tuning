name: Pre-commit

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-suffix: lint
      - uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: uv sync --group lint && uv run pre-commit run --all-files
        env:
          # no-commit-to-branch is a developer-side safety net; CI legitimately
          # runs against master on push events, so skip it here.
          SKIP: no-commit-to-branch
